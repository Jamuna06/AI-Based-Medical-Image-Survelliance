<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI | Diagnostic Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --neon: #0ea5e9;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Branding */
        .navbar {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0; z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); animation: pulse 2s infinite; }
        .brand-text { font-weight: 800; letter-spacing: 2px; font-size: 1.1rem; color: #fff; }

        .nav-links a {
            color: #94a3b8; text-decoration: none; font-size: 0.85rem; border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 8px; transition: 0.3s;
        }
        .nav-links a:hover { border-color: var(--primary); color: white; background: rgba(14, 165, 233, 0.05); }

        /* Main UI Container */
        .portal-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px 20px;
            background: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.15), transparent 70%);
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid var(--border); width: 100%; max-width: 500px;
            padding: 40px; border-radius: 28px; box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
            position: relative; overflow: hidden;
        }

        /* FEATURE: Scanner Background Glow */
        .glass-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary), transparent 30%);
            animation: rotate 10s linear infinite; opacity: 0.05; z-index: -1;
        }

        .portal-header { text-align: center; margin-bottom: 30px; }
        .portal-header h1 { margin: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        .portal-header p { color: #64748b; font-size: 0.85rem; margin-top: 8px; font-weight: 500; }

        /* Form Controls */
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea {
            width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border); border-radius: 12px; color: white;
            font-size: 0.95rem; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* FEATURE: Advanced Upload Box with Preview */
        .upload-area {
            border: 2px dashed var(--border); padding: 25px; text-align: center;
            border-radius: 16px; cursor: pointer; transition: 0.4s;
            background: rgba(255, 255, 255, 0.01); position: relative;
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(14, 165, 233, 0.05); }
        #file-input { display: none; }
        
        .upload-icon { font-size: 1.5rem; margin-bottom: 8px; display: block; filter: drop-shadow(0 0 5px var(--primary)); }
        #preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; display: none; margin: 0 auto 10px; border: 2px solid var(--primary); }

        /* FEATURE: Neural Initializing Effect */
        .btn-initialize {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white; border: none; border-radius: 14px; font-weight: 700;
            font-size: 0.9rem; letter-spacing: 1.5px; cursor: pointer;
            transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        .btn-initialize:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5); }

        /* FEATURE: Security Footer */
        .secure-footer {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            margin-top: 25px; color: #475569; font-size: 0.75rem;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Processing Loader Layer */
        #loader-overlay {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div style="width: 50px; height: 50px; border: 3px solid #1e293b; border-top-color: var(--primary); border-radius: 50%; animation: rotate 1s infinite linear;"></div>
        <h3 style="margin-top: 20px; letter-spacing: 2px; color: #f8fafc;">AI ENGINE INITIALIZING</h3>
        <p style="color: #64748b; font-size: 0.8rem;">Syncing Neural Layers • 2026 Core v4.0</p>
    </div>

    <nav class="navbar">
        <div class="brand">
            <div class="brand-dot"></div>
            <div class="brand-text">MEDICAL AI SYSTEM</div>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">DATABASE RECORDS</a>
        </div>
    </nav>

    <div class="portal-container">
        <div class="glass-card">
            <div class="portal-header">
                <h1>Diagnostic Portal</h1>
                <p>Neural Image Analysis & Pattern Recognition</p>
            </div>

            <form action="/" method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
                <div class="form-group">
                    <label>Patient Full Name</label>
                    <input type="text" name="name" placeholder="E.g. John Doe" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" placeholder="Age" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Clinical Observations</label>
                    <textarea name="remark" rows="2" placeholder="Describe symptoms..."></textarea>
                </div>

                <div class="form-group">
                    <label>X-Ray Radiology Data</label>
                    <label for="file-input" class="upload-area" id="drop-zone">
                        <img id="preview-img" src="#" alt="Preview">
                        <span class="upload-icon">⚡</span>
                        <span id="file-name" style="font-size: 0.85rem; font-weight: 500;">Click to upload X-Ray Scan</span>
                        <input type="file" name="scan" id="file-input" required onchange="handleFileChange()">
                    </label>
                </div>

                <button type="submit" class="btn-initialize">
                    INITIALIZE AI SCAN
                </button>

                <div class="secure-footer">
                    <span>🔒 End-to-End Encrypted Analysis</span>
                    <span>•</span>
                    <span>HIPAA Compliant</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        function handleFileChange() {
            const input = document.getElementById('file-input');
            const label = document.getElementById('file-name');
            const preview = document.getElementById('preview-img');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
                label.innerText = input.files[0].name;
                label.style.color = "#0ea5e9";
            }
        }

        function showLoader() {
            document.getElementById('loader-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
